{% extends "base.html" %}
{% block title %}Search — RAG Tools{% endblock %}
{% block header %}
<h1 class="page-title">Search</h1>
{% endblock %}
{% block content %}

<div class="card">
    <form hx-get="/ui/search" hx-target="#results" hx-swap="innerHTML" hx-indicator="#search-spinner">
        <div class="form-row">
            <div style="flex: 1 1 200px; min-width: 200px;">
                <input type="text" name="query" class="form-input" placeholder="Enter your search query..." required autofocus>
            </div>
            <div style="width: 160px; flex-shrink: 0;">
                <select name="project" class="form-select">
                    <option value="">All projects</option>
                </select>
            </div>
            <div style="width: 80px; flex-shrink: 0;">
                <input type="number" name="top_k" class="form-input" value="10" min="1" max="50">
            </div>
            <button type="submit" class="btn btn-primary" style="flex-shrink: 0;">Search</button>
        </div>
        <span id="search-spinner" class="htmx-indicator" style="margin-top: 10px;">Searching...</span>
    </form>
</div>

<script>
    // Populate project dropdown from configured projects (v2) with v1 fallback
    fetch('/api/projects/configured').then(r => {
        if (!r.ok) throw new Error('Not available');
        return r.json();
    }).then(data => {
        const sel = document.querySelector('select[name=project]');
        (data.projects || []).filter(p => p.enabled).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name || p.id;
            sel.appendChild(opt);
        });
    }).catch(() => {
        // Fallback for v1 or service not running
        fetch('/api/projects').then(r => r.json()).then(data => {
            const sel = document.querySelector('select[name=project]');
            (data.projects || []).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.project_id;
                opt.textContent = p.project_id;
                sel.appendChild(opt);
            });
        }).catch(() => {});
    });
</script>

<div id="results">
    <div style="text-align:center; padding:48px 20px; color:var(--color-text-muted);">
        <p style="font-size:18px; margin-bottom:6px;">Search your knowledge base</p>
        <p style="font-size:13px;">Enter a query above to find relevant content across all indexed projects.</p>
    </div>
</div>

<script>
    // Auto-fill and search if query parameter is in URL (from dashboard quick search)
    var params = new URLSearchParams(window.location.search);
    var q = params.get('query');
    if (q) {
        var input = document.querySelector('input[name=query]');
        input.value = q;
        // Trigger htmx search after a short delay (let project dropdown populate)
        setTimeout(function() { htmx.trigger(input.closest('form'), 'submit'); }, 300);
    }
</script>

{% endblock %}
