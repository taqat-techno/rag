<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RAG Tools{% endblock %}</title>
    <link rel="icon" href="/static/logo.png" type="image/png">
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="stylesheet" href="/static/design.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="/static/logo.png" alt="" onerror="this.style.display='none'">
            <span>RAG Tools</span>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-group-label">Overview</div>
            <a href="/" class="sidebar-link {% if page == 'dashboard' %}active{% endif %}">
                <span class="icon">&#9670;</span> Dashboard
            </a>
            <a href="/map" class="sidebar-link {% if page == 'map' %}active{% endif %}">
                <span class="icon">&#9673;</span> Map
            </a>
            <a href="/search" class="sidebar-link {% if page == 'search' %}active{% endif %}">
                <span class="icon">&#9906;</span> Search
            </a>
            <a href="/index" class="sidebar-link {% if page == 'index' %}active{% endif %}">
                <span class="icon">&#9881;</span> Index
            </a>

            <div class="sidebar-group-label">Management</div>
            <a href="/projects" class="sidebar-link {% if page == 'projects' %}active{% endif %}">
                <span class="icon">&#9776;</span> Projects
            </a>
            <a href="/ignore" class="sidebar-link {% if page == 'ignore' %}active{% endif %}">
                <span class="icon">&#9949;</span> Ignore Rules
            </a>
            <a href="/config" class="sidebar-link {% if page == 'config' %}active{% endif %}">
                <span class="icon">&#9881;</span> Settings
            </a>
            <a href="/startup" class="sidebar-link {% if page == 'startup' %}active{% endif %}">
                <span class="icon">&#9211;</span> Startup
            </a>
        </nav>
        <div class="sidebar-footer">
            v1.0.0 &middot; localhost only
        </div>
    </aside>

    <div class="main-content">
        <div class="content-header">
            {% block header %}{% endblock %}
        </div>
        <div class="content-body">
            {% block content %}{% endblock %}
        </div>
        <footer class="main-footer">
            RAG Tools &mdash; Local AI Knowledge Base Manager
        </footer>

        <div id="activity-drawer" class="activity-drawer">
            <div class="activity-bar" onclick="document.getElementById('activity-drawer').classList.toggle('open')">
                <span>Activity</span>
                <span class="activity-chevron">&#9650;</span>
            </div>
            <div class="activity-panel" id="activity-panel"
                 hx-get="/ui/activity" hx-trigger="every 5s" hx-swap="innerHTML">
            </div>
        </div>
    </div>
</body>
</html>
