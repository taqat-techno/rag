<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RAG Tools{% endblock %}</title>
    <link rel="icon" href="/static/favicon.png" type="image/png">
    <link rel="stylesheet" href="/static/design.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="/static/logo.png" alt="TaqaTechno" class="brand-logo">
            <div class="brand-text">
                <span class="brand-name">TaqaTechno</span>
                <span class="brand-product">RAG Tools</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="sidebar-group-label">Overview</div>
            <a href="/" class="sidebar-link {% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/map" class="sidebar-link {% if page == 'map' %}active{% endif %}">Map</a>
            <a href="/search" class="sidebar-link {% if page == 'search' %}active{% endif %}">Search</a>

            <div class="sidebar-group-label">Management</div>
            <a href="/projects" class="sidebar-link {% if page == 'projects' %}active{% endif %}">Projects</a>
            <a href="/config" class="sidebar-link {% if page == 'config' %}active{% endif %}">Settings</a>
        </nav>
    </aside>

    <div class="main-content">
        <!-- Crash banner: populated on every page load from /api/crash-history.
             Stays hidden if there are no unreviewed crash markers. -->
        <div id="crash-banner-slot"
             hx-get="/ui/crash-banner"
             hx-trigger="load"
             hx-swap="innerHTML"></div>

        <div class="content-header">
            {% block header %}{% endblock %}
        </div>
        <div class="content-body">
            {% block content %}{% endblock %}
        </div>

        <div id="activity-drawer" class="activity-drawer">
            <div class="activity-bar" onclick="document.getElementById('activity-drawer').classList.toggle('open')">
                <span>Activity</span>
                <span class="activity-chevron">&#9650;</span>
            </div>
            <div class="activity-panel" id="activity-panel"
                 hx-get="/ui/activity" hx-trigger="every 15s" hx-swap="innerHTML">
            </div>
        </div>
    </div>

    <div id="global-processing" class="global-processing-banner">
        <span class="overlay-spinner"></span>
        <span id="global-processing-msg">Processing...</span>
    </div>

    <div id="confirm-modal" class="confirm-overlay">
        <div class="confirm-dialog">
            <p id="confirm-msg" class="confirm-message"></p>
            <div class="confirm-actions">
                <button id="confirm-cancel" class="btn btn-secondary btn-sm">Cancel</button>
                <button id="confirm-ok" class="btn btn-danger btn-sm">Confirm</button>
            </div>
        </div>
    </div>
    <script>
    // Global processing guard for long operations
    document.body.addEventListener('htmx:beforeRequest', function(e) {
        var msg = e.detail.elt.getAttribute('data-processing-msg');
        if (msg) {
            document.getElementById('global-processing-msg').textContent = msg;
            document.getElementById('global-processing').classList.add('active');
        }
        // Section overlay: show when hx-indicator points to a .section-overlay
        var indId = e.detail.elt.getAttribute('hx-indicator') || e.detail.elt.closest('[hx-indicator]')?.getAttribute('hx-indicator');
        if (indId) {
            var overlay = document.querySelector(indId);
            if (overlay && overlay.classList.contains('section-overlay')) overlay.classList.add('active');
        }
    });
    document.body.addEventListener('htmx:afterRequest', function(e) {
        if (e.detail.elt.getAttribute('data-processing-msg')) {
            document.getElementById('global-processing').classList.remove('active');
        }
        var indId = e.detail.elt.getAttribute('hx-indicator') || e.detail.elt.closest('[hx-indicator]')?.getAttribute('hx-indicator');
        if (indId) {
            var overlay = document.querySelector(indId);
            if (overlay && overlay.classList.contains('section-overlay')) overlay.classList.remove('active');
        }
    });

    // Custom confirm modal
    document.body.addEventListener('htmx:confirm', function(e) {
        if (!e.detail.question) return;
        e.preventDefault();
        var modal = document.getElementById('confirm-modal');
        document.getElementById('confirm-msg').textContent = e.detail.question;
        modal.classList.add('open');
        document.getElementById('confirm-ok').onclick = function() {
            modal.classList.remove('open');
            e.detail.issueRequest(true);
        };
        document.getElementById('confirm-cancel').onclick = function() {
            modal.classList.remove('open');
        };
    });
    </script>
</body>
</html>
