name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache SentenceTransformer model
        uses: actions/cache@v4
        with:
          path: build\model_cache
          key: model-build-cache-all-MiniLM-L6-v2-v1

      - name: Install dependencies
        run: pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest -q

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build with model
        run: python scripts/build.py

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          iscc installer.iss

      - name: Create zip of portable bundle
        shell: bash
        run: |
          cd dist
          7z a -tzip "RAGTools-${{ steps.version.outputs.version }}-portable.zip" rag/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RAG Tools v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/RAGTools-Setup-${{ steps.version.outputs.version }}.exe
            dist/RAGTools-${{ steps.version.outputs.version }}-portable.zip

  build-macos:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache SentenceTransformer model
        uses: actions/cache@v4
        with:
          path: build/model_cache
          key: model-build-cache-all-MiniLM-L6-v2-macos-v1

      - name: Install dependencies
        run: pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest -q

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build with model
        run: python scripts/build.py

      - name: Create tar.gz of bundle
        run: |
          cd dist
          tar -czf "RAGTools-${{ steps.version.outputs.version }}-macos-arm64.tar.gz" rag/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RAG Tools v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/RAGTools-${{ steps.version.outputs.version }}-macos-arm64.tar.gz

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-cpu-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-cpu-

      - name: Cache SentenceTransformer model
        uses: actions/cache@v4
        with:
          path: build/model_cache
          key: model-build-cache-all-MiniLM-L6-v2-linux-v1

      - name: Install CPU-only torch
        # PyTorch's default Linux x86_64 wheel pulls in ~2 GB of CUDA runtime
        # (nvidia-cublas, cudnn, cusparse, nccl, etc.) as transitive deps.
        # RAG Tools runs on CPU only, so we install the CPU-only build first
        # — the subsequent ``pip install -e .`` sees torch already satisfies
        # the ``torch>=1.11.0`` constraint and doesn't re-resolve from PyPI.
        # Without this the Linux tar.gz exceeds GitHub's 2 GiB asset limit.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest -q

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build with model
        run: python scripts/build.py

      - name: Create tar.gz of bundle
        run: |
          cd dist
          tar -czf "RAGTools-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz" rag/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RAG Tools v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/RAGTools-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz
