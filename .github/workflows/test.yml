name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-22.04]
        python-version: ["3.12"]
        include:
          - os: windows-latest
            pip-cache: ~\AppData\Local\pip\Cache
            hf-cache: ~\.cache\huggingface\hub\models--sentence-transformers--all-MiniLM-L6-v2
          - os: macos-14
            pip-cache: ~/Library/Caches/pip
            hf-cache: ~/.cache/huggingface/hub/models--sentence-transformers--all-MiniLM-L6-v2
          - os: ubuntu-22.04
            pip-cache: ~/.cache/pip
            hf-cache: ~/.cache/huggingface/hub/models--sentence-transformers--all-MiniLM-L6-v2

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ${{ matrix.pip-cache }}
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache SentenceTransformer model
        uses: actions/cache@v4
        with:
          path: ${{ matrix.hf-cache }}
          key: model-all-MiniLM-L6-v2-${{ runner.os }}-v1

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=ragtools --cov-report=term-missing -q

      - name: Verify CLI
        run: rag version
